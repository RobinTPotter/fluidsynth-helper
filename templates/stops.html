<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexagon Grid</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #222;
        }
        svg {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        text {
            font-family: Arial, sans-serif;
            font-size: 16px;
            fill: white;
            text-anchor: middle;
            dominant-baseline: middle;
            pointer-events: none; /* Prevent text from blocking clicks */
        }
    </style>
</head>
<body>
    <svg id="hexGrid"></svg>

    <script>
        const svg = document.getElementById("hexGrid");

        const hexSize = 80; // Radius of the hexagon
        const hexWidth = Math.sqrt(3) * hexSize;
        const hexHeight = 2 * hexSize;
        const vertSpacing = hexHeight * 0.75;

        const cols = Math.ceil(window.innerWidth / hexWidth);
        const rows = Math.ceil(window.innerHeight / vertSpacing);

        function createHexagon(x, y, label) {
            const points = [
                [x + hexWidth / 2, y],
                [x + hexWidth, y + hexSize / 2],
                [x + hexWidth, y + hexSize * 1.5],
                [x + hexWidth / 2, y + hexHeight],
                [x, y + hexSize * 1.5],
                [x, y + hexSize / 2]
            ].map(p => p.join(",")).join(" ");

            const hex = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
            hex.setAttribute("points", points);
            hex.setAttribute("stroke", "#fff");
            hex.setAttribute("fill", "none");

            

            // Add click event listener
            hex.addEventListener("click", function () {
window.location.href = "/select"
                this.setAttribute("fill", this.getAttribute("fill") === "none" ? getRandomColor() : "none");
            });




            // Create text element centered inside the hexagon
            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.setAttribute("x", x + hexWidth / 2);
            text.setAttribute("y", y + hexHeight / 2);
            text.textContent = label;





            svg.appendChild(hex);
            svg.appendChild(text);
        }

        function getRandomColor() {
            return `hsl(${Math.random() * 360}, 100%, 50%)`; // Random bright color
        }

        let row = 0;
        let col = 0;

        {% for instr in instruments %}
            x = col * hexWidth + (row % 2 === 1 ? hexWidth / 2 : 0);
            y = row * vertSpacing;
            createHexagon(x, y, "{{ instr.name }} ({{ instr.bank }}-{{ instr.voice }}");


if (col<cols) {
col = col + 1;
} else {
col = 0;
row = row + 1
}

        {% endfor %}
    </script>
</body>
</html>
