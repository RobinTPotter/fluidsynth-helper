<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundFont Instruments</title>
</head>
<body>
    <h1>Select an Instrument</h1>
    {% for instr in instruments %}
        <form action="/select" method="post" style="display:inline;">
            <input type="hidden" name="bank" value="{{ instr.bank }}">
            <input type="hidden" name="voice" value="{{ instr.voice }}">
            <button type="submit">{{ instr.name }} ({{ instr.bank }}-{{ instr.voice }})</button>
        </form>
        <br>
    {% endfor %}
</body>
</html>
